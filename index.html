<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Sejarah Kebudayaan Islam Interaktif</title>
    <meta name="description" content="Atlas peta interaktif sejarah kebudayaan Islam — jelajahi titik-titik historis, jalur dakwah, dan wilayah kekuasaan Islam dari abad ke-6 hingga era modern. Media pembelajaran SKI Kelas 12.">
    <meta name="keywords" content="atlas sejarah Islam, peta interaktif SKI, sejarah kebudayaan Islam, Nusantara, media pembelajaran">
    
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.css" />

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/mobile.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        page: 'var(--bg-page)',
                        panel: 'var(--bg-panel)',
                        'panel-solid': 'var(--bg-panel-solid)',
                        input: 'var(--bg-input)',
                        badge: 'var(--bg-badge)',
                        active: 'var(--bg-active)',
                        tooltip: 'var(--bg-tooltip)',
                        'era-header': 'var(--bg-era-header)',
                        
                        title: 'var(--text-title)',
                        primary: 'var(--text-primary)',
                        secondary: 'var(--text-secondary)',
                        muted: 'var(--text-muted)',
                        'muted-alt': 'var(--text-muted-alt)',
                        icon: 'var(--text-icon)',
                        'text-tooltip': 'var(--text-tooltip)',
                        button: 'var(--text-button)',

                        'border-light': 'var(--border-light)',
                        'border-input': 'var(--border-input)',
                        'border-panel': 'var(--border-panel)',
                        'border-active': 'var(--border-active)',

                        accent: 'var(--accent-primary)',
                        orange: 'var(--accent-orange)',
                        handle: 'var(--handle-color)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.js"></script>
</head>

<body class="bg-surface font-body-md text-on-surface overflow-hidden h-screen flex flex-col antialiased">

    <header class="fixed top-0 left-0 w-full h-[56px] z-[100] flex items-center justify-between px-7 bg-page/95 backdrop-blur-md border-b border-border-light">
        <div class="flex items-center gap-4">
            <img src="assets/logo/atlas-logo.jpg" alt="Logo Atlas" class="w-9 h-9 object-contain select-none">
            <h1 onclick="resetTampilanDefault()" class="font-title cursor-pointer text-[2.05rem] leading-none tracking-tight transition-opacity select-none md:block hidden">
                Atlas Sejarah Kebudayaan Islam
            </h1>
            <h1 onclick="resetTampilanDefault()" class="font-title cursor-pointer text-[1.5rem] leading-none tracking-tight transition-opacity select-none md:hidden block">
                Atlas Sejarah Islam
            </h1>
        </div>

        <div class="flex items-center gap-3">
            <span class="hidden md:inline-block px-3 py-[5px] rounded-full bg-badge border border-border-input text-muted text-[10px] tracking-[0.14em] uppercase font-medium select-none">
                Media Pembelajaran SKI
            </span>
            
            <button id="theme-toggle" class="flex items-center justify-center w-8 h-8 rounded-full bg-badge border border-border-input text-title hover:bg-active transition-colors cursor-pointer" title="Toggle Dark Mode">
                <span id="theme-icon" class="material-symbols-outlined text-[18px]">dark_mode</span>
            </button>
            
            <!-- Mobile Dropdown Toggle (Hanya muncul di mobile) -->
            <button id="mobile-nav-toggle" class="md:hidden flex items-center gap-1 bg-badge px-3 py-1.5 rounded-full border border-border-input text-title font-medium text-[12px]">
                <span class="material-symbols-outlined text-[16px]">menu_open</span>
                Menu
            </button>
        </div>
    </header>    

    <main class="flex flex-1 pt-14 relative overflow-hidden w-full h-full">
    
        <div id="map" class="absolute inset-0 w-full h-full z-10"></div>

        <aside id="list-panel" class="absolute left-4 top-4 bottom-4 w-[340px] z-40 flex flex-col glass-panel border border-gray-200/80 rounded-2xl shadow-2xl overflow-hidden transition-all duration-300">
            <div class="flex flex-col h-full px-4 pt-4 pb-3 bg-panel-solid select-none">
                <div class="hidden md:block">
                    <h1 class="text-[30px] font-bold tracking-tight text-title">Atlas Sejarah</h1>
                    <p class="mt-1 text-[11px] uppercase tracking-[0.18em] text-muted-alt">Jelajah Titik Masuknya Islam di Nusantara</p>
                </div>
                
                <div class="mt-0 md:mt-5">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-icon text-[20px]">
                            search
                        </span>
                        <input id="search-input" type="text" spellcheck="false" placeholder="Cari lokasi..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-border-input bg-input text-[14px] text-primary placeholder:text-muted focus:outline-none focus:border-border-active focus:ring-2 focus:ring-accent/10 transition">
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar mt-4">

                    <div id="era-header"></div>

                    <div id="location-list" class="flex flex-col gap-3 mt-3">
                    </div>

                </div>
        </aside>

        <aside id="detail-panel" class="hidden absolute right-4 top-4 bottom-4 w-[360px] z-40 flex flex-col glass-panel rounded-2xl p-6 overflow-hidden transition-all duration-300">            
            
            <!-- Handle bar untuk drag di mobile -->
            <div id="bottom-sheet-handle" class="w-full flex justify-center pb-4 pt-1 cursor-grab active:cursor-grabbing md:hidden">
                <div class="w-12 h-1.5 bg-handle rounded-full"></div>
            </div>

            <button onclick="tutupDetailPanel()" class="hidden md:flex items-center gap-2 text-button hover:text-title font-medium mb-5 group text-left cursor-pointer text-[12px] uppercase tracking-[0.15em] transition-colors">
                <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-0.5">close</span>
                Tutup Detail
            </button>
            
            <h2 id="detail-nama" class="font-title text-[34px] leading-none"></h2>
            <p id="detail-tahun" class="mt-2 text-[12px] uppercase tracking-[0.18em] text-muted"></p>

            <div id="detail-foto-wrapper" class="mb-2 hidden">
                <img id="detail-foto" src="" alt="" class="w-full h-48 object-cover rounded-2xl border border-border-panel shadow-sm">
            </div>

            <hr class="mt-2 mb-.5 border-border-light">

            <div id="detail-metadata" class="mt-0 mb-2 space-y-1">
                <div class="flex items-start gap-3 py-1">
                    <span class="material-symbols-outlined text-[18px] text-muted">
                        location_on
                    </span>
                    
                    <div>
                        <p class="text-[11px] uppercase tracking-[0.18em] text-muted">
                        Lokasi</p>
                        <p id="detail-lokasi" class="text-[13px] font-medium text-primary"></p>
                    </div>
                </div>

                <div class="flex items-start gap-3 py-1">
                    <span class="material-symbols-outlined text-[18px] text-muted">
                        account_balance
                    </span>
                <div>
                    <p class="text-[11px] uppercase tracking-[0.18em] text-muted">
                        Kategori</p>
                    <p id="detail-kategori" class="text-[14px] text-primary"></p>
                </div>
            </div>
                <div class="flex items-start gap-3 py-1">
                    <span class="material-symbols-outlined text-[18px] text-muted">
                        public</span>
                    <div>
                        <p class="text-[11px] uppercase tracking-[0.18em] text-muted">
                        Wilayah</p>
                        <p id="detail-wilayah" class="text-[14px] text-primary"></p>
                    </div>
                </div>
            </div>

            <hr class="mb-6 border-border-light">

            <div class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                <p id="detail-deskripsi" class="text-[15px] leading-8 text-secondary text-justify"></p>
            </div>
        </aside>

    </main>

    <!-- Era Shortcut Legend (Poin Navigasi Cepat) -->
    <div id="timeline-legend"></div>

    <div id="timeline-indicator">
        <input
            id="timeline-current"
            type="text"
            value="570"
            spellcheck="false">
        <div id="timeline-pointer"></div>
    </div>

    <footer id="timeline-footer">
        <div class="timeline-wrapper">
            <div id="timeline-track">
                <div id="timeline-ruler">
                    <div id="timeline-ruler-content"></div>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dataMarker.js"></script>
    <script src="js/dataJalur.js"></script>
    <script src="js/dataWilayah.js"></script>
    <script src="js/dataObjekAtlas.js"></script>

    <script src="js/timeline-data.js"></script>

    <script src="js/map.js"></script> 
    <script src="js/timelineRuler.js"></script>
    <script src="js/timeline.js"></script>

    <script src="js/loader.js"></script>
    <script src="js/mobile-ui.js"></script>
</body>
</html>
