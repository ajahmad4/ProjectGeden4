<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Sejarah Interaktif</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        #map { height: 100%; width: 100%; z-index: 10; }
        .custom-div-icon {
            background: transparent !important;
            border: none !important;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="flex h-screen bg-gray-100 font-sans overflow-hidden">

    <aside class="w-80 bg-white shadow-2xl z-20 flex flex-col h-screen overflow-hidden">
        
        <div class="p-5 border-b bg-emerald-900 text-white">
            <h1 class="text-xl font-bold">Atlas Sejarah</h1>
            <p class="text-sm opacity-80">Jelajah Titik Penting</p>
        </div>

        <div class="flex-1 relative overflow-hidden bg-white">
            
            <div id="list-panel" class="absolute inset-0 overflow-y-auto p-4 flex flex-col gap-3 transition-all duration-300">
                <div id="location-list" class="flex flex-col gap-3">
                    </div>
            </div>

            <div id="detail-panel" class="hidden absolute inset-0 overflow-y-auto p-5 transition-all duration-300 bg-white flex flex-col">
                <button onclick="showList()" class="flex items-center gap-2 text-emerald-900 hover:text-emerald-700 font-semibold mb-4 group text-left cursor-pointer">
                    <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
                    Kembali
                </button>
                
                <h2 id="detail-nama" class="text-xl font-bold text-gray-800 leading-tight"></h2>
                <p id="detail-tahun" class="text-emerald-700 italic text-xs mt-1"></p>
                
                <hr class="my-3 border-gray-200">
                
                <p id="detail-deskripsi" class="text-sm text-gray-600 leading-relaxed text-justify"></p>
            </div>

        </div>
    </aside>

    <main class="flex-1 relative">
        <div id="map"></div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
