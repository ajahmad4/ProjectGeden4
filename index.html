<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Sejarah Kebudayaan Islam Interaktif</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.css" />
    <link rel="stylesheet" href="css/style.css" />

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.js"></script>
</head>

<body class="bg-surface font-body-md text-on-surface overflow-hidden h-screen flex flex-col antialiased">

    <header class="fixed top-0 left-0 w-full z-[100] flex justify-between items-center px-6 bg-white/80 backdrop-blur-md border-b border-gray-200/60 shadow-sm h-14">
        <h1 onclick="resetTampilanDefault()" class="cursor-pointer hover:opacity-85 font-bold text-emerald-950 tracking-tight transition-opacity select-none">
            Atlas Sejarah Kebudayaan Islam
        </h1>            
        <div class="flex items-center gap-4">
            <span class="text-[10px] bg-emerald-100 text-emerald-900 px-2.5 py-1 rounded-full font-semibold uppercase tracking-wider select-none">
                Media Pembelajaran SKI
            </span>
        </div>
    </header>    
    
    <main class="flex flex-1 pt-14 relative overflow-hidden w-full h-full">
    
        <div id="map" class="absolute inset-0 w-full h-full z-10"></div>

        <aside id="list-panel" class="absolute left-4 top-4 bottom-4 w-80 z-40 flex flex-col glass-panel border border-gray-200/80 rounded-xl shadow-2xl overflow-hidden transition-all duration-300">
            <div class="p-4 border-b bg-emerald-900 text-white select-none">
                <h1 class="text-lg font-bold tracking-tight">Atlas Sejarah</h1>
                <p class="text-xs opacity-80">Jelajah Titik Masuknya Islam di Nusantara</p>
            </div>
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <div id="location-list" class="flex flex-col gap-3">
                    </div>
            </div>
        </aside>

        <div id="detail-panel" class="hidden absolute right-4 top-4 bottom-4 w-85 z-40 flex flex-col glass-panel border border-gray-200/80 rounded-xl shadow-2xl p-5 overflow-hidden transition-all duration-300">
            <button onclick="tutupDetailPanel()" class="flex items-center gap-2 text-emerald-950 hover:text-emerald-700 font-semibold mb-4 group text-left cursor-pointer text-xs select-none transition-colors">
                <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-0.5">close</span>
                Tutup Detail
            </button>
            
            <h2 id="detail-nama" class="text-xl font-bold text-gray-800 leading-tight tracking-tight"></h2>
            <p id="detail-tahun" class="text-emerald-800 font-medium italic text-xs mt-1"></p>
            
            <hr class="my-3 border-gray-200/80">
            
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                <p id="detail-deskripsi" class="text-sm text-gray-700 leading-relaxed text-justify font-normal"></p>
            </div>
        </div>

    </main>

    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/map.js"></script>
    <script src="js/loader.js"></script>
</body>
</html>
