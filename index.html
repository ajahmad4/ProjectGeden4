<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Sejarah Interaktif</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Kita hanya butuh sedikit CSS tambahan untuk memastikan peta tidak tertutup */
        #map { height: 100%; width: 100%; z-index: 10; }
        /* Mengatur agar ikon tidak memiliki latar belakang kotak putih */
        .custom-div-icon {
            background: transparent !important;
            border: none !important;
        }
        /* Memastikan font symbols dirender dengan benar */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex h-screen bg-gray-100 font-sans overflow-hidden">

    <aside class="w-80 bg-white shadow-2xl z-20 flex flex-col">
        <div class="p-5 border-b border-gray-200 bg-emerald-900 text-white">
            <h1 class="text-xl font-bold">Atlas Sejarah</h1>
            <p class="text-sm opacity-80">Jelajahi Titik Penting</p>
        </div>

        <div id="location-list" class="flex-1 overflow-y-auto p-4 space-y-3">
        </div>

        <div id="list-panel" class="flex-1 overflow-y-auto">
            <div class="p-5 border-b bg-emerald-900 text-white">
                <h1 class="text-xl font-bold">Atlas Sejarah</h1>
            </div>
            <div id="location-list"></div>
        </div>

    <div id="detail-panel" class="hidden flex-1 p-5 overflow-y-auto">
        <button onclick="showList()" class="text-emerald-900 mb-4 font-bold">&larr; Kembali</button>
        <h2 id="detail-nama" class="text-2xl font-bold text-gray-800"></h2>
        <p id="detail-tahun" class="text-emerald-700 italic"></p>
        <p id="detail-deskripsi" class="mt-4 text-gray-600"></p>
    </div>
</aside>
    </aside>

    <main class="flex-1 relative">
        <div id="map"></div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/loader.js"></script>
    <script>
        loadLocations();
    </script>
</body>
</html>
